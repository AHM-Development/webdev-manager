# AHM Web Manager — nginx reverse proxy.
#
# Install:
#   sudo cp deploy/nginx-ahm.conf /etc/nginx/sites-available/ahm
#   sudo ln -s /etc/nginx/sites-available/ahm /etc/nginx/sites-enabled/ahm
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d app.example.com -d api.example.com   # adds HTTPS
#
# Replace app.example.com / api.example.com with your real subdomains.

# ---- Frontend (Next.js on 127.0.0.1:3000) ----
server {
  listen 80;
  server_name app.example.com;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# ---- API (Express on 127.0.0.1:5000) ----
server {
  listen 80;
  server_name api.example.com;

  # Uploaded evidence/screenshots are capped at 8 MB by the API — leave headroom.
  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Lets Express (trust proxy) mark cookies Secure behind TLS termination.
    proxy_set_header X-Forwarded-Proto $scheme;
    # socket.io realtime needs the WebSocket upgrade to pass through.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
