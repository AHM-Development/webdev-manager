# Reverse proxy vhost — mirrors the old nginx/nginx.conf.
# Modules (proxy, proxy_http, proxy_wstunnel, rewrite) are enabled in the Dockerfile.
<VirtualHost *:80>
    ServerName localhost
    # 10485760 bytes = 10m (was nginx client_max_body_size 10m)
    LimitRequestBody 10485760

    ProxyPreserveHost On
    RewriteEngine On

    # NOTE: Apache evaluates these top-down, so the catch-all "/" MUST stay last.

    # API → Express backend, /api/ prefix preserved (Express mounts at /api/v1)
    ProxyPass        /api/ http://api:5001/api/
    ProxyPassReverse /api/ http://api:5001/api/

    # phpMyAdmin — bare path redirects to trailing slash, then proxy.
    # The "/phpmyadmin !" exclusion keeps the bare path out of the catch-all
    # proxy below so RedirectMatch can fire (must come AFTER the /phpmyadmin/
    # rule — ProxyPass matches in config order).
    RedirectMatch 301 ^/phpmyadmin$ /phpmyadmin/
    ProxyPass        /phpmyadmin/ http://phpmyadmin:80/
    ProxyPassReverse /phpmyadmin/ http://phpmyadmin:80/
    ProxyPass        /phpmyadmin  !
    # Restrict access in production — uncomment and set your IP
    # <Location /phpmyadmin/>
    #     Require ip 203.0.113.0/24
    # </Location>

    # WebSocket upgrade (Next.js HMR / live features) → web:3000
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule ^/?(.*) ws://web:3000/$1 [P,L]

    # Everything else → Next.js frontend (keep last)
    ProxyPass        / http://web:3000/
    ProxyPassReverse / http://web:3000/
</VirtualHost>
