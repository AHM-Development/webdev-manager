# Development reverse proxy.
# Docker runs infrastructure/proxy only; Node apps run on the host.
<VirtualHost *:80>
    ServerName localhost
    LimitRequestBody 10485760

    ProxyPreserveHost On
    RewriteEngine On

    # API -> Express backend running on the host.
    # macOS often reserves port 5000 for AirPlay, so use 5001 locally.
    ProxyPass        /api/ http://host.docker.internal:5001/api/
    ProxyPassReverse /api/ http://host.docker.internal:5001/api/

    # Next.js HMR websocket -> host machine dev server.
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule ^/?(.*) ws://host.docker.internal:3000/$1 [P,L]

    # Everything else -> host machine Next.js dev server.
    ProxyPass        / http://host.docker.internal:3000/
    ProxyPassReverse / http://host.docker.internal:3000/
</VirtualHost>
